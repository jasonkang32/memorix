name: memorix
description: "Memorix — Your Private Media Vault"
publish_to: 'none'
version: 1.0.0+12

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 라우팅
  go_router: ^14.8.1

  # 로컬 DB
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.1
  path_provider: ^2.1.5

  # 미디어 캡처·가져오기
  camera: ^0.11.1
  image_picker: ^1.2.1
  file_picker: ^8.3.7

  # 이미지·영상 처리
  flutter_image_compress: ^2.4.0
  video_thumbnail: ^0.5.3

  # AI 자동 태깅
  google_mlkit_image_labeling: ^0.13.0
  # OCR 텍스트 인식
  google_mlkit_text_recognition: ^0.14.0

  # PDF 보고서 (온디바이스)
  pdf: ^3.11.1
  printing: ^5.14.0

  # Google Drive (Pro)
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  http: ^1.4.0

  # 보안
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  cryptography: ^2.7.0
  crypto: ^3.0.0

  # 시간 추상화 (테스트용 fakeAsync와 호환)
  clock: ^1.1.1

  # 공유
  share_plus: ^10.1.4

  # 미디어 뷰어
  photo_view: ^0.15.0
  video_player: ^2.9.2
  chewie: ^1.10.0

  # GPS 위치
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # 네트워크 연결 감지
  connectivity_plus: ^6.1.4

  # EXIF 메타데이터 읽기
  exif: ^3.3.0

  # 국가 선택 picker (250개 국가, flag emoji, 검색바 내장)
  country_picker: ^2.0.27

  # 유틸
  uuid: ^4.5.1
  intl: ^0.20.2
  permission_handler: ^11.4.0
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_async: ^1.3.1
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  flutter_flavorizr: ^2.2.2
  flutter_launcher_icons: ^0.14.4
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: false

flutter_native_splash:
  color: "#1A3C30"
  color_dark: "#0D1F19"
  image: assets/images/splash_logo.png
  android_12:
    color: "#1A3C30"
    icon_background_color: "#1A3C30"
    image: assets/images/splash_logo.png
  fullscreen: true
